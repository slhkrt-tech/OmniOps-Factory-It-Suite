name: omniops

services:
  db:
    image: postgres:15-alpine
    container_name: omniops_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omniops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniops}
      POSTGRES_DB: ${POSTGRES_DB:-omniops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omniops} -d ${POSTGRES_DB:-omniops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omniops_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    image: omniops/app:latest
    container_name: omniops_app
    labels:
      org.opencontainers.image.title: "OmniOps"
      org.opencontainers.image.description: "OmniOps Factory IT Suite web application"
    # YENİ: Production seviyesi Gunicorn ve otomatik kurulum komutları
    command: sh -c "python manage.py migrate && python manage.py setup_helpdesk && python manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} --timeout ${GUNICORN_TIMEOUT:-120} --max-requests ${GUNICORN_MAX_REQUESTS:-1000} --max-requests-jitter 100 --access-logfile - --error-logfile -"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
      - logs_data:/app/logs
      - db_backups:/app/db_backups
    depends_on:
      - db
      - redis
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      APP_NAME: OmniOps
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgres://${POSTGRES_USER:-omniops}:${POSTGRES_PASSWORD:-omniops}@db:5432/${POSTGRES_DB:-omniops}
      CELERY_BROKER_URL: 'redis://redis:6379/0'
      CELERY_RESULT_BACKEND: 'redis://redis:6379/0'
      POSTGRES_DB: ${POSTGRES_DB:-omniops}
      POSTGRES_USER: ${POSTGRES_USER:-omniops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniops}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      WAZUH_API_KEY: ${WAZUH_API_KEY:-}
      WEBHOOK_ALLOWED_IPS: ${WEBHOOK_ALLOWED_IPS:-127.0.0.1,::1}
      REMOTE_PROBE_SHARED_SECRET: ${REMOTE_PROBE_SHARED_SECRET:?REMOTE_PROBE_SHARED_SECRET must be set in .env}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      VAULT_KEY: ${VAULT_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@omniops.local}
      ADMINS: ${ADMINS:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BACKUP_BUCKET: ${AWS_S3_BACKUP_BUCKET:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
      POSTGRES_BACKUP_DIR: ${POSTGRES_BACKUP_DIR:-/app/db_backups}
      POSTGRES_BACKUP_FORMAT: ${POSTGRES_BACKUP_FORMAT:-custom}
      POSTGRES_BACKUP_FILE_PREFIX: ${POSTGRES_BACKUP_FILE_PREFIX:-omniops_backup}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-http://localhost:8082}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-omniops-jwt-secret}
      COLLABORA_SERVER_URL: ${COLLABORA_SERVER_URL:-http://localhost:9980}
      DOCUMENT_EDITOR_BACKEND: ${DOCUMENT_EDITOR_BACKEND:-auto}
      WOPI_SECRET: ${WOPI_SECRET:-}
    cap_add:
      - NET_RAW
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/health/', headers={'X-Forwarded-Proto':'https'}); urllib.request.urlopen(req, timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  worker:
    build: .
    image: omniops/app:latest
    container_name: omniops_worker
    labels:
      org.opencontainers.image.title: "OmniOps"
      org.opencontainers.image.description: "OmniOps Factory IT Suite celery worker"
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
      - media_data:/app/media
      - logs_data:/app/logs
      - db_backups:/app/db_backups
    depends_on:
      - db
      - redis
      - web
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      APP_NAME: OmniOps
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      DATABASE_URL: postgres://${POSTGRES_USER:-omniops}:${POSTGRES_PASSWORD:-omniops}@db:5432/${POSTGRES_DB:-omniops}
      POSTGRES_DB: ${POSTGRES_DB:-omniops}
      POSTGRES_USER: ${POSTGRES_USER:-omniops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniops}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      CELERY_BROKER_URL: 'redis://redis:6379/0'
      CELERY_RESULT_BACKEND: 'redis://redis:6379/0'
      WAZUH_API_KEY: ${WAZUH_API_KEY:-}
      WEBHOOK_ALLOWED_IPS: ${WEBHOOK_ALLOWED_IPS:-127.0.0.1,::1}
      REMOTE_PROBE_SHARED_SECRET: ${REMOTE_PROBE_SHARED_SECRET:?REMOTE_PROBE_SHARED_SECRET must be set in .env}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      VAULT_KEY: ${VAULT_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@omniops.local}
      ADMINS: ${ADMINS:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BACKUP_BUCKET: ${AWS_S3_BACKUP_BUCKET:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
      POSTGRES_BACKUP_DIR: ${POSTGRES_BACKUP_DIR:-/app/db_backups}
      POSTGRES_BACKUP_FORMAT: ${POSTGRES_BACKUP_FORMAT:-custom}
      POSTGRES_BACKUP_FILE_PREFIX: ${POSTGRES_BACKUP_FILE_PREFIX:-omniops_backup}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-http://localhost:8082}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-omniops-jwt-secret}
      COLLABORA_SERVER_URL: ${COLLABORA_SERVER_URL:-http://localhost:9980}
      DOCUMENT_EDITOR_BACKEND: ${DOCUMENT_EDITOR_BACKEND:-auto}
      WOPI_SECRET: ${WOPI_SECRET:-}
    cap_add:
      - NET_RAW
      - NET_ADMIN

  beat:
    build: .
    image: omniops/app:latest
    container_name: omniops_beat
    labels:
      org.opencontainers.image.title: "OmniOps"
      org.opencontainers.image.description: "OmniOps Factory IT Suite celery beat"
    command: celery -A core beat --loglevel=info
    volumes:
      - .:/app
      - media_data:/app/media
      - logs_data:/app/logs
      - db_backups:/app/db_backups
    depends_on:
      - db
      - redis
      - web
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      APP_NAME: OmniOps
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in .env}
      DATABASE_URL: postgres://${POSTGRES_USER:-omniops}:${POSTGRES_PASSWORD:-omniops}@db:5432/${POSTGRES_DB:-omniops}
      POSTGRES_DB: ${POSTGRES_DB:-omniops}
      POSTGRES_USER: ${POSTGRES_USER:-omniops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omniops}
      POSTGRES_HOST: db
      POSTGRES_PORT: '5432'
      CELERY_BROKER_URL: 'redis://redis:6379/0'
      CELERY_RESULT_BACKEND: 'redis://redis:6379/0'
      WAZUH_API_KEY: ${WAZUH_API_KEY:-}
      WEBHOOK_ALLOWED_IPS: ${WEBHOOK_ALLOWED_IPS:-127.0.0.1,::1}
      REMOTE_PROBE_SHARED_SECRET: ${REMOTE_PROBE_SHARED_SECRET:?REMOTE_PROBE_SHARED_SECRET must be set in .env}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      VAULT_KEY: ${VAULT_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@omniops.local}
      ADMINS: ${ADMINS:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BACKUP_BUCKET: ${AWS_S3_BACKUP_BUCKET:-}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-}
      POSTGRES_BACKUP_DIR: ${POSTGRES_BACKUP_DIR:-/app/db_backups}
      POSTGRES_BACKUP_FORMAT: ${POSTGRES_BACKUP_FORMAT:-custom}
      POSTGRES_BACKUP_FILE_PREFIX: ${POSTGRES_BACKUP_FILE_PREFIX:-omniops_backup}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-http://localhost:8082}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-omniops-jwt-secret}
      COLLABORA_SERVER_URL: ${COLLABORA_SERVER_URL:-http://localhost:9980}
      DOCUMENT_EDITOR_BACKEND: ${DOCUMENT_EDITOR_BACKEND:-auto}
      WOPI_SECRET: ${WOPI_SECRET:-}

  onlyoffice:
    image: onlyoffice/documentserver:8.0.1
    container_name: omniops_onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-omniops-jwt-secret}
      JWT_HEADER: Authorization
    ports:
      - "8082:80"

  collabora:
    image: collabora/code:24.04.13.1.1
    container_name: omniops_collabora
    restart: unless-stopped
    environment:
      domain: localhost|web|host\\.docker\\.internal
      extra_params: --o:ssl.enable=false --o:ssl.termination=false
    ports:
      - "9980:9980"

volumes:
  postgres_data:
  redis_data:
  media_data:
  logs_data:
  db_backups: