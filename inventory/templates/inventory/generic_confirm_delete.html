{% extends 'base.html' %}
{% load i18n %}

{% block content %}
<div class="container mt-4">
    <div class="card border-danger shadow">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0"><i class="fas fa-exclamation-triangle"></i>{% trans " Silme İşlemi Onayı" %}</h4>
        </div>
        <div class="card-body">
            <p class="lead"><strong>{{ object }}</strong>{% trans "kaydını tamamen silmek üzeresiniz." %}</p>
            <p class="text-danger">{% trans "Bu işlem geri alınamaz. Emin misiniz?" %}</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger"><i class="fas fa-trash"></i>{% trans " Evet, Kalıcı Olarak Sil" %}</button>
                <a href="javascript:history.back()" class="btn btn-secondary"><i class="fas fa-times"></i>{% trans " Vazgeç" %}</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
