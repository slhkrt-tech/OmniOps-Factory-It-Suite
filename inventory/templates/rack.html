{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "OmniOps - Veri Merkezi Kabin Görünümü" %}{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold"><i class="iconify" data-icon="mdi:server-network"></i>{% trans " Veri Merkezi - Kabin Haritası" %}</h4>
    </div>
    
    <div class="row" id="data-center-floor">
        </div>
</div>

<style>
    /* Kabin ve Slot Tasarımları (Karanlık Tema Uyumlu) */
    .rack-cabinet {
        border: 4px solid #334155;
        background-color: #0f172a;
        border-radius: 8px;
        width: 320px;
        margin: 0 auto;
        padding: 8px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .rack-header {
        text-align: center;
        background-color: #1e293b;
        color: #38bdf8;
        font-weight: 700;
        padding: 12px;
        margin-bottom: 15px;
        border-bottom: 2px solid #334155;
        border-radius: 4px;
        letter-spacing: 1px;
    }
    .rack-slot {
        height: 32px; /* 1U Yüksekliği */
        border-bottom: 1px dashed #334155;
        display: flex;
        align-items: center;
        position: relative;
        background-color: #1e293b;
    }
    .rack-slot:nth-child(even) {
        background-color: #0f172a;
    }
    .u-number {
        width: 35px;
        color: #94a3b8;
        font-size: 11px;
        font-weight: bold;
        text-align: center;
        border-right: 2px solid #334155;
    }
    .slot-content {
        flex-grow: 1;
        position: relative;
        height: 100%;
    }
    
    /* Cihaz Kutusu */
    .device-block {
        position: absolute;
        bottom: 0; /* Aşağıdan yukarı çizilir */
        left: 0;
        width: 100%;
        color: white;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 4px;
        box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), 0 4px 10px rgba(0,0,0,0.4);
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.1);
    }
    
    /* Cihaz Türlerine Göre Renkler */
    .device-switch { background: linear-gradient(145deg, #0d9488, #0f766e); } /* Teal */
    .device-router { background: linear-gradient(145deg, #e11d48, #be123c); } /* Rose */
    .device-server { background: linear-gradient(145deg, #2563eb, #1d4ed8); } /* Blue */
    .device-firewall { background: linear-gradient(145deg, #f59e0b, #c2410c); } /* Amber */
    .device-other { background: linear-gradient(145deg, #64748b, #475569); } /* Slate */
</style>

<script>
const RACK_I18N = {
    undefinedRack: "{% trans 'Tanımsız Kabin' %}",
    apiError: "{% trans 'API Hatası:' %}",
    loadFailed: "{% trans 'Kabin verileri yüklenirken hata oluştu:' %}",
    emptyFloor: "{% trans 'Henüz kabinlere yerleştirilmiş bir cihaz bulunmuyor. Lütfen Envanter sayfasından cihaz ekleyip \"Kabin Adı\" ve \"Başlangıç U\" değerlerini girin.' %}",
    capacityLabel: "{% trans '42 U KAPASİTE' %}",
};
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/rack-devices/')
        .then(response => {
            if (!response.ok) throw new Error(RACK_I18N.apiError + ' ' + response.status);
            return response.json();
        })
        .then(devices => {
            drawRacksAndDevices(devices);
        })
        .catch(error => {
            console.error("Kabin verisi çekilemedi:", error);
            document.getElementById('data-center-floor').innerHTML = 
                `<div class="alert alert-danger shadow-sm">${RACK_I18N.loadFailed} ${error.message}</div>`;
        });
});

function drawRacksAndDevices(devices) {
    const floor = document.getElementById('data-center-floor');
    
    const racks = {};
    devices.forEach(d => {
        const rName = d.rack_name || RACK_I18N.undefinedRack;
        if (!racks[rName]) racks[rName] = [];
        racks[rName].push(d);
    });

    if (Object.keys(racks).length === 0) {
        floor.innerHTML = `<div class="col-12"><div class="alert alert-info shadow-sm"><i class="iconify me-2" data-icon="mdi:information"></i>${RACK_I18N.emptyFloor}</div></div>`;
        return;
    }

    for (const [rackName, rackDevices] of Object.entries(racks)) {
        
        let rackHtml = `
            <div class="col-md-6 col-lg-4 col-xl-3 mb-5">
                <div class="rack-cabinet" id="rack-${rackName.replace(/\s+/g, '-')}">
                    <div class="rack-header">${rackName.toUpperCase()} <br><small class="text-muted" style="font-size: 10px;">(${RACK_I18N.capacityLabel})</small></div>
                    <div class="rack-body" style="position: relative;">
        `;

        // 42U Slotlarını yukarıdan aşağıya (42'den 1'e) çiz
        for (let u = 42; u >= 1; u--) {
            rackHtml += `
                <div class="rack-slot">
                    <div class="u-number">${u}U</div>
                    <div class="slot-content" id="slot-${rackName.replace(/\s+/g, '-')}-${u}"></div>
                </div>
            `;
        }
        rackHtml += `</div></div></div>`;
        floor.innerHTML += rackHtml;

        // 2. Cihazları Üretilen Slotlara Yerleştir
        rackDevices.forEach(device => {
            const startU = parseInt(device.rack_u_position);
            const height = parseInt(device.rack_u_height) || 1;
            const safeRackName = rackName.replace(/\s+/g, '-');
            const targetSlot = document.getElementById(`slot-${safeRackName}-${startU}`);

            if (targetSlot) {
                // Renk Sınıfını Belirle
                let colorClass = 'device-other';
                const type = (device.type || '').toLowerCase();
                if (type.includes('switch')) colorClass = 'device-switch';
                else if (type.includes('router')) colorClass = 'device-router';
                else if (type.includes('server')) colorClass = 'device-server';
                else if (type.includes('firewall')) colorClass = 'device-firewall';

                const deviceDiv = document.createElement('div');
                deviceDiv.className = `device-block ${colorClass}`;
                
                // Yüksekliği hesapla: 1U = 32px + (aradaki boşluklar)
                deviceDiv.style.height = (height * 32 + (height - 1)) + 'px'; 
                
                // İçerik Metni
                deviceDiv.innerHTML = `
                    <div style="font-size: 12px; font-weight: bold; letter-spacing: 0.5px; text-align: center; padding: 0 5px;">${device.name}</div>
                    <div style="font-size: 9px; opacity: 0.8;">${device.type.toUpperCase()} | ${height}U</div>
                `;

                targetSlot.appendChild(deviceDiv);
            }
        });
    }
}
</script>
{% endblock %}
